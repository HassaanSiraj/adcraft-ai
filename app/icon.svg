<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0c0b10"/>

  <!-- Ad canvas card -->
  <rect x="4" y="6" width="24" height="20" rx="3" fill="#1c1929" stroke="#f5c842" stroke-width="1.5"/>

  <!-- Bold headline bar (the "hook") -->
  <rect x="8" y="10" width="16" height="3.5" rx="1.5" fill="#f5c842"/>

  <!-- Body copy lines -->
  <rect x="8" y="16.5" width="12" height="2" rx="1" fill="#f5c842" fill-opacity="0.55"/>
  <rect x="8" y="20" width="9" height="2" rx="1" fill="#f5c842" fill-opacity="0.3"/>
</svg>
